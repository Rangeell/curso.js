<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 01</title>

    <style>
        h1 {
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <h1>O Sistema de Matrícula (Strings + Comprimento)</h1>
    <script>
        var nome = prompt('Qual o seu nome? ')
        console.log(`O seu nome em maiúsculas é ${nome.toUpperCase()}`)
        console.log(`Em minúsculas é: ${nome.toLowerCase()}`)
        console.log(`O seu nome possui um total de ${nome.length} caracteres`)
        console.log(nome.replace('a','@'))
    </script>
</body>
</html>
