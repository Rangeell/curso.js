<head>

    <style>

    </style>
</head>
<body>
    <h1>Calculadora de Jantar (Numbers + Coerção + Formatação)</h1>
    <script>
        var valorConsumo = Number(prompt('Qual foi o valor de consumo? '))
        var gorjetaP = Number(prompt('Quanto gostaria de oferecer de gorjeta em porcentagem? '))
        var gorjetaV = (valorConsumo * gorjetaP)/100
        var total = valorConsumo + gorjetaV
        var em3 = total/3
        console.log(`O valor total da sua conta saiu em ${total.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}`)
        console.log(` A sua conta divida em 3 fica: ${em3.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}`)
    </script>
</body>
</html>
