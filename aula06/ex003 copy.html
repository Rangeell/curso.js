<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
</head>

<!-- head é parte do documento resposável pelas configurações -->

<style>
body {
    background-color: rgb(46, 139, 245);
    font: normal 20pt Arial;
}

h1 {
    color: yellow
    ;
}

p {
    color: white;
}

/* Comentário em CSS */

</style>

<body>
    <h1>Olá, mundo!</h1>
    <p>
        Já me livrei da maldição
    </p>

    <script>
        var n1 = Number(window.prompt ('Digite um número: ')) // Retorna string
        var n2 = Number(window.prompt ('Digite outro número: ')) // Retorna string
        var s = n1 + n2
        window.alert (`A soma dos valores entre ${n1} e ${n2} é ${s}`)
        // + para adição
        // + para concatenação
    </script>

</body>

</html>
