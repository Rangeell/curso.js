<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
</head>
<!-- head é parte do documento responsável pelas configurações -->
<style>
body {
    background-color: rgb(46, 139, 245);
    font: normal 20pt Arial;
}

h1 {
    color: yellow
    ;
}

p {
    color: white;
}

</style>

<body>
    <h1>Olá, mundo!</h1>
    <p>
        Já me livrei da maldição
    </p>

    <script>
        window.alert("Minha primeira mensagem") // Janela de alerta.
        window.confirm('Está gostando de JS?') // Janela com botão "ok" e "cancelar".
        window.prompt('Qual é o seu nome?') // Vai perguntar o nome.
    </script>

</body>

</html>
